name: Deploy to EC2

on:

  push:

    branches:

      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code

        uses: actions/checkout@v3

      - name: Setup SSH

        run: |

          mkdir -p ~/.ssh

          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

          ssh-keyscan -H YOUR_EC2_PUBLIC_IP >> ~/.ssh/known_hosts

          echo -e "Host github.com\n\tIdentityFile ~/.ssh/id_ed25519\n\tStrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy to EC2

        run: |

          ssh -i ~/.ssh/id_ed25519 ubuntu@YOUR_EC2_PUBLIC_IP << 'EOF'

            cd ~/aws-flask-app

            git pull origin main

            pkill -f app.py || true

            nohup python3 app.py > output.log 2>&1 &

          EOF