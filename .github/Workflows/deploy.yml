name: Deploy to EC2

on:

  push:

    branches:

      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.EC2_HOST }}

          username: ${{ secrets.EC2_USER }}

          key: ${{ secrets.EC2_KEY }}

          script: |

            cd /home/ubuntu

            git pull origin main

            source myenv/bin/activate

            pkill -f app.py || true

            nohup python3 app.py > output.log 2>&1 &
            nohup python3 app.py > output.log 2>&1 &
